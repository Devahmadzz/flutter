name: offline_vault_kyc
description: "Offline Vault KYC - Secure offline banking KYC capture app for field agents."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Material Design
  cupertino_icons: ^1.0.2
  
  # Camera & Image Processing
  camera: ^0.11.0+1
  image_picker: ^1.0.0
  image: ^4.1.3
  
  # File & Storage
  path_provider: ^2.1.2
  path: ^1.9.0
  archive: ^3.4.10
  
  # Security & Encryption
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  local_auth: ^2.1.6
  
  # Document Generation
  pdf: ^3.10.7
  signature: ^5.4.1
  
  # Data & Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  provider: ^6.1.1
  
  # JSON serialization
  json_serializable: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    
dependency_overrides:
  path: 1.8.2
